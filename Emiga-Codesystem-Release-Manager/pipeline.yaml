````yaml
name: ECUM Release Pipeline

on:
  workflow_dispatch:
    inputs:
      branchName:
        description: 'Feature branch name'
        required: true
        default: 'feature/codesystem-update'
      semverBump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
      dryRun:
        description: 'Dry run (no publish)'
        required: true
        default: 'true'

jobs:
  build-validate-package:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max_old_space_size=4096"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branchName }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install SUSHI (fsh-sushi)
        run: npm install -g fsh-sushi

      - name: Run SUSHI → generate FHIR JSON
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p output
          echo "Running SUSHI..."
          # generate into ./output ; adjust path to your FSH folder if needed
          sushi . --out output || echo "SUSHI returned non-zero exit code" >&2

      - name: Create basic validation report (placeholder)
        run: |
          mkdir -p ci-artifacts
          FILE_COUNT=$(find output -type f | wc -l || echo 0)
          # Basic existence check: if no files, mark invalid
          if [ "$FILE_COUNT" -eq "0" ]; then
            VALID=false
            ERR_MSG="No FHIR artifacts generated by SUSHI"
          else
            VALID=true
            ERR_MSG=""
          fi
          cat > ci-artifacts/validation-report.json <<EOF
          {
            "generatedFiles": $FILE_COUNT,
            "valid": $VALID,
            "errors": [$( [ -n "$ERR_MSG" ] && printf "\"%s\"" "$ERR_MSG" || printf "" )]
          }
          EOF

      - name: Run advanced validation (optional - placeholder)
        run: |
          echo "Optional: integrate Firely/HAPI validator here."
          # Example (uncomment and adapt if you have a validator available):
          # java -jar fhir-validator-cli.jar output/*.json --output ci-artifacts/full-validation-report.json

      - name: Package FHIR artifacts (.tgz)
        run: |
          PACKAGE_NAME="emiga-fhir-package-${{ github.run_number }}.tgz"
          tar -czf "$PACKAGE_NAME" -C output .
          mkdir -p ci-artifacts
          mv "$PACKAGE_NAME" ci-artifacts/

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: ci-artifacts/validation-report.json

      - name: Upload fhir package
        uses: actions/upload-artifact@v4
        with:
          name: fhir-package
          path: ci-artifacts/*.tgz

  publish:
    needs: build-validate-package
    if: ${{ github.event.inputs.dryRun == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: fhir-package
          path: ./downloaded

      - name: Publish to Simplifier (placeholder)
        env:
          SIMPLIFIER_API_KEY: ${{ secrets.SIMPLIFIER_API_KEY }}
        run: |
          echo "Publishing to Simplifier would run here."
          if [ -z "${SIMPLIFIER_API_KEY}" ]; then
            echo "SIMPLIFIER_API_KEY not set - aborting publish" >&2
            exit 1
          fi
          # TODO: Implement actual publish call, e.g. using curl or simplifier CLI
          echo "TODO: upload downloaded/*.tgz to Simplifier using SIMPLIFIER_API_KEY"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            ci-artifacts/*
            downloaded/*.tgz

````
